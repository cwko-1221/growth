<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Growth Mindset Spinning Wheel</title>
<style>
  body{
    margin:0;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    background:#fff7ea;
    font-family:Arial, Helvetica, sans-serif;
    color:#111;
  }
  h1{margin:16px 0 8px;font-size:30px;text-align:center}
  .stage{
    position:relative;
    width:min(88vw,680px);
    height:min(88vw,680px);
  }
  #wheel{
    width:100%;
    height:100%;
    border-radius:50%;
    transition:transform 4.5s cubic-bezier(.1,.75,.15,1);
    box-shadow:0 10px 25px rgba(0,0,0,.25);
  }
  .pin{
    position:absolute;
    top:-2px;
    left:50%;
    transform:translateX(-50%);
    width:0;height:0;
    border-left:22px solid transparent;
    border-right:22px solid transparent;
    border-top:58px solid #e11d48;
    z-index:5;
  }
  .controls{margin:20px 0 12px;display:flex;gap:12px}
  button{
    font-size:20px;
    font-weight:bold;
    border:0;
    border-radius:999px;
    padding:12px 28px;
    color:white;
    background:#111827;
  }
  button:disabled{opacity:.55}
  #result{
    width:min(760px,calc(100vw - 32px));
    min-height:48px;
    padding:14px 16px;
    margin-bottom:20px;
    box-sizing:border-box;
    background:white;
    border-radius:16px;
    box-shadow:0 3px 12px rgba(0,0,0,.12);
    font-size:22px;
    line-height:1.35;
    text-align:center;
  }
</style>
</head>
<body>
<h1>Growth Mindset Wheel</h1>
<div class="stage">
  <div class="pin"></div>
  <svg id="wheel" viewBox="0 0 1000 1000" aria-label="spinning wheel">
    <g id="segments"></g>
    <circle cx="500" cy="500" r="92" fill="#facc15" stroke="#92400e" stroke-width="10"/>
    <text x="500" y="515" text-anchor="middle" font-size="34" font-weight="700" fill="#111827">SPIN</text>
  </svg>
</div>
<div class="controls">
  <button id="spin">Spin!</button>
  <button id="reset">Reset</button>
</div>
<div id="result">Click “Spin!” to choose a sentence.</div>

<script>
const quotes = ["I learn from mistakes.", "I strive for progress, not perfection.", "I keep an open mind.", "I keep learning.", "I can develop my brain by trying new things.", "I put extra effort into things that are challenging.", "I ask for help when I need it.", "I’m inspired by the success of others.", "I need more practice to succeed.", "I have unique gifts and talents."];
const colours = ["#fde68a","#fdba74","#fda4af","#c4b5fd","#93c5fd","#67e8f9","#86efac","#bef264","#f9a8d4","#a7f3d0"];
const svgNS = "http://www.w3.org/2000/svg";
const wheel = document.getElementById("wheel");
const group = document.getElementById("segments");
const result = document.getElementById("result");
const spinButton = document.getElementById("spin");
const resetButton = document.getElementById("reset");
let currentRotation = 0;
let isSpinning = false;

function polar(cx, cy, r, angleDeg){
  const a = (angleDeg - 90) * Math.PI / 180;
  return {x: cx + r * Math.cos(a), y: cy + r * Math.sin(a)};
}

function wedgePath(start, end){
  const r = 470, cx = 500, cy = 500;
  const p1 = polar(cx, cy, r, start);
  const p2 = polar(cx, cy, r, end);
  const large = end - start > 180 ? 1 : 0;
  return "M " + cx + " " + cy + " L " + p1.x + " " + p1.y + " A " + r + " " + r + " 0 " + large + " 1 " + p2.x + " " + p2.y + " Z";
}

function wrapWords(text, maxChars){
  const words = text.split(" ");
  const lines = [];
  let line = "";
  words.forEach(word => {
    const test = line ? line + " " + word : word;
    if(test.length > maxChars && line){
      lines.push(line);
      line = word;
    } else {
      line = test;
    }
  });
  if(line) lines.push(line);
  return lines.slice(0,4);
}

function draw(){
  const n = quotes.length;
  const step = 360 / n;
  group.innerHTML = "";

  for(let i=0; i<n; i++){
    const start = i * step;
    const end = start + step;
    const mid = start + step / 2;

    const path = document.createElementNS(svgNS, "path");
    path.setAttribute("d", wedgePath(start, end));
    path.setAttribute("fill", colours[i % colours.length]);
    path.setAttribute("stroke", "white");
    path.setAttribute("stroke-width", "5");
    group.appendChild(path);

    const textGroup = document.createElementNS(svgNS, "g");
    textGroup.setAttribute("transform", "rotate(" + mid + " 500 500)");

    const lines = wrapWords(quotes[i], 18);
    lines.forEach((line, index) => {
      const t = document.createElementNS(svgNS, "text");
      t.setAttribute("x", "500");
      t.setAttribute("y", String(145 + (index - (lines.length-1)/2) * 32));
      t.setAttribute("text-anchor", "middle");
      t.setAttribute("font-size", "25");
      t.setAttribute("font-weight", "700");
      t.setAttribute("fill", "#111827");
      t.textContent = line;
      textGroup.appendChild(t);
    });
    group.appendChild(textGroup);
  }

  const outer = document.createElementNS(svgNS, "circle");
  outer.setAttribute("cx","500");
  outer.setAttribute("cy","500");
  outer.setAttribute("r","480");
  outer.setAttribute("fill","none");
  outer.setAttribute("stroke","#d4a017");
  outer.setAttribute("stroke-width","24");
  group.appendChild(outer);
}

function spin(){
  if(isSpinning) return;
  isSpinning = true;
  spinButton.disabled = true;
  result.textContent = "Spinning...";

  const n = quotes.length;
  const chosen = Math.floor(Math.random() * n);
  const step = 360 / n;
  const targetCentre = chosen * step + step / 2;
  const offset = (Math.random() - .5) * step * .25;
  currentRotation += 360 * (6 + Math.floor(Math.random() * 4)) + (360 - targetCentre) + offset;
  wheel.style.transform = "rotate(" + currentRotation + "deg)";

  setTimeout(() => {
    result.textContent = quotes[chosen];
    isSpinning = false;
    spinButton.disabled = false;
  }, 4600);
}

function reset(){
  if(isSpinning) return;
  currentRotation = 0;
  wheel.style.transform = "rotate(0deg)";
  result.textContent = "Click “Spin!” to choose a sentence.";
}

draw();
spinButton.addEventListener("click", spin);
resetButton.addEventListener("click", reset);
</script>
</body>
</html>
